name: staffops
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter

  # State management, DI, and navigation
  get: ^4.7.3

  # Networking and HTTP comunication
  dio: ^5.9.2

  # Local storage, secure storage, file system access, offline database, and UUID generation
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  # isar: ^3.1.0+1
  # isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  uuid: ^4.5.3

  # Runtime permission management
  permission_handler: ^12.0.1

  # File selection, image picking, doc opening, and PDF viewing
  file_picker: ^11.0.2
  image_picker: ^1.2.1
  open_file: ^3.5.11
  syncfusion_flutter_pdfviewer: ^33.2.5

  # Launch external URLs and system intents
  url_launcher: ^6.3.2

  # Date formatting and date picker
  intl: ^0.20.2
  date_picker_plus: ^7.0.0

  # Additional UI component
  timeline_tile: ^2.0.0

  # Development utility for generating application launcher icons
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  # Flutter testing framework
  flutter_test:
    sdk: flutter

  # Code generation tools for Isar and other build-time generators
  # build_runner: ^2.4.13
  # isar_generator: ^3.1.0+1

  # Linting flutter
  # flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/auth/

flutter_launcher_icons:
  android: true
  image_path: "assets/image/logo.png"

  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/image/logo.png"
